<div
  class="flex min-h-screen items-center justify-center bg-neutral-100 px-4 py-12 dark:bg-dark-surface"
>
  <div
    class="w-full max-w-sm rounded-2xl border border-neutral-200 bg-white p-8 shadow-sm dark:border-neutral-800 dark:bg-neutral-900"
  >
    <div class="mb-6 text-center">
      <span
        class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-primary-600 text-lg font-bold text-white"
        aria-hidden="true"
        >AP</span
      >
      <h1 class="text-xl font-semibold text-neutral-900 dark:text-white">{{ companyName }}</h1>
      <p class="mt-1 text-sm text-neutral-500">Sign in to your account</p>
    </div>

    @if (error()) {
      <div
        role="alert"
        class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-900 dark:bg-red-950/40 dark:text-red-300"
      >
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4" novalidate>
      <div>
        <label for="userName" class="mb-1 block text-sm font-medium text-neutral-700 dark:text-neutral-300"
          >Username</label
        >
        <input
          id="userName"
          type="text"
          autocomplete="username"
          formControlName="userName"
          class="w-full rounded-lg border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900 focus:border-primary-500 focus:outline-2 focus:outline-offset-0 focus:outline-primary-500 dark:border-neutral-700 dark:bg-neutral-800 dark:text-white"
          [attr.aria-invalid]="form.controls.userName.touched && form.controls.userName.invalid"
        />
        @if (form.controls.userName.touched && form.controls.userName.invalid) {
          <p class="mt-1 text-xs text-red-600">Username is required.</p>
        }
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-neutral-700 dark:text-neutral-300"
          >Password</label
        >
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          formControlName="password"
          class="w-full rounded-lg border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900 focus:border-primary-500 focus:outline-2 focus:outline-offset-0 focus:outline-primary-500 dark:border-neutral-700 dark:bg-neutral-800 dark:text-white"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <p class="mt-1 text-xs text-red-600">Password is required.</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 disabled:cursor-not-allowed disabled:opacity-60"
      >
        @if (loading()) {
          <span
            class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
            aria-hidden="true"
          ></span>
          Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>
  </div>
</div>
