<div class="mx-auto max-w-7xl px-4 pb-12">
  <div class="mb-6">
    <h1 class="text-xl font-semibold text-neutral-900 dark:text-white">
      Welcome@if (user(); as u) {, {{ u.userName || u.username }}}
    </h1>
    <p class="text-sm text-neutral-500">Here's an overview of your account data.</p>
  </div>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (card of cardData(); track card.label) {
      <a
        [routerLink]="card.link"
        class="group flex items-center gap-4 rounded-2xl border border-neutral-200 bg-white p-5 transition hover:shadow-md focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 dark:border-neutral-800 dark:bg-neutral-900"
      >
        <span class="flex h-12 w-12 items-center justify-center rounded-xl text-white {{ card.accent }}" aria-hidden="true">
          <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path [attr.d]="card.icon" />
          </svg>
        </span>
        <div>
          <p class="text-sm text-neutral-500">{{ card.label }}</p>
          <p class="text-2xl font-bold text-neutral-900 dark:text-white">
            @if (card.value === null) {
              <span class="inline-block h-6 w-10 animate-pulse rounded bg-neutral-200 dark:bg-neutral-700"></span>
            } @else {
              {{ card.value }}
            }
          </p>
        </div>
      </a>
    }
  </div>
</div>
