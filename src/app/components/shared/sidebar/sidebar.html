<aside
  class="fixed inset-y-0 left-0 z-40 flex w-14 flex-col border-r border-neutral-200 bg-white transition-all md:w-64 dark:border-neutral-800 dark:bg-dark-surface"
>
  <!-- Brand -->
  <div class="flex h-14 items-center gap-2 border-b border-neutral-200 px-3 dark:border-neutral-800">
    <span
      class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-primary-600 text-sm font-bold text-white"
      aria-hidden="true"
      >AP</span
    >
    <span class="hidden truncate text-base font-semibold md:block">{{ companyName }}</span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto px-2 py-3" aria-label="Main navigation">
    <ul class="space-y-1">
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-950 dark:text-primary-300"
            #rla="routerLinkActive"
            [attr.aria-current]="rla.isActive ? 'page' : null"
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-neutral-700 hover:bg-neutral-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 dark:text-neutral-300 dark:hover:bg-neutral-800"
          >
            <svg
              class="h-5 w-5 shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path [attr.d]="item.icon" />
            </svg>
            <span class="hidden md:block">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- User + logout -->
  <div class="border-t border-neutral-200 p-2 dark:border-neutral-800">
    @if (user(); as u) {
      <div class="hidden px-2 pb-2 md:block">
        <p class="truncate text-sm font-medium">{{ u.userName || u.username }}</p>
        <p class="text-xs text-neutral-500">Signed in</p>
      </div>
    }
    <button
      type="button"
      (click)="logout()"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-red-600 hover:bg-red-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600 dark:hover:bg-red-950/40"
    >
      <svg
        class="h-5 w-5 shrink-0"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
      </svg>
      <span class="hidden md:block">Logout</span>
    </button>
  </div>
</aside>
