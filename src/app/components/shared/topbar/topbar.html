<header
  class="fixed inset-x-0 top-0 z-30 ml-14 flex h-14 items-center gap-3 border-b border-neutral-200/70 bg-white/80 px-4 backdrop-blur-md md:ml-64 dark:border-neutral-800/70 dark:bg-neutral-900/80"
>
  <!-- Hamburger (mobile only) -->
  <button
    type="button"
    class="md:hidden flex h-9 w-9 shrink-0 items-center justify-center rounded-lg text-neutral-600 hover:bg-neutral-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 dark:text-neutral-300 dark:hover:bg-neutral-800"
    (click)="layout.toggleMobileNav()"
    [attr.aria-expanded]="layout.mobileNavOpen()"
    aria-label="Toggle navigation"
  >
    @if (layout.mobileNavOpen()) {
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12" />
      </svg>
    } @else {
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    }
  </button>

  <!-- Left: breadcrumb -->
  <div class="min-w-0 flex-1">
    <app-breadcrumb />
  </div>

  <!-- Live clock -->
  <div class="hidden items-center gap-2 rounded-lg bg-neutral-100 px-3 py-1.5 sm:flex dark:bg-neutral-800">
    <svg class="h-4 w-4 text-primary-600 dark:text-primary-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9" />
      <path d="M12 7v5l3 2" />
    </svg>
    <span class="font-mono text-sm tabular-nums text-neutral-700 dark:text-neutral-200" aria-label="Current time">{{ time() }}</span>
  </div>

  <!-- Theme toggle -->
  <button
    type="button"
    (click)="toggleTheme()"
    role="switch"
    [attr.aria-checked]="isDark()"
    [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
    [attr.title]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
    class="theme-toggle"
    [class.is-dark]="isDark()"
  >
    <span class="theme-toggle-track" aria-hidden="true">
      <!-- Sun -->
      <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
      </svg>
      <!-- Moon -->
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
      </svg>
      <span class="theme-toggle-thumb"></span>
    </span>
  </button>

  <!-- Calendar -->
  <div class="relative" (click)="$event.stopPropagation()">
    <button
      type="button"
      (click)="toggleCalendar($event)"
      [attr.aria-expanded]="calendarOpen()"
      aria-label="Open calendar"
      class="flex items-center gap-2 rounded-lg border border-neutral-200 bg-white px-3 py-1.5 text-sm font-medium text-neutral-700 transition-colors hover:bg-neutral-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
    >
      <svg class="h-4 w-4 text-primary-600 dark:text-primary-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <path d="M16 2v4M8 2v4M3 10h18" />
      </svg>
      <span class="hidden md:inline">{{ dateLabel() }}</span>
    </button>

    @if (calendarOpen()) {
      <div
        role="dialog"
        aria-label="Calendar"
        class="calendar-pop absolute right-0 mt-2 w-72 rounded-xl border border-neutral-200 bg-white p-3 shadow-xl dark:border-neutral-700 dark:bg-neutral-900"
      >
        <div class="mb-2 flex items-center justify-between">
          <button type="button" (click)="prevMonth()" aria-label="Previous month" class="cal-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
          </button>
          <span class="text-sm font-semibold text-neutral-900 dark:text-white">{{ monthLabel() }}</span>
          <button type="button" (click)="nextMonth()" aria-label="Next month" class="cal-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
          </button>
        </div>

        <div class="grid grid-cols-7 gap-1 text-center">
          @for (wd of weekDays; track wd) {
            <span class="py-1 text-xs font-medium text-neutral-400">{{ wd }}</span>
          }
          @for (cell of days(); track $index) {
            <span
              class="flex h-8 items-center justify-center rounded-lg text-sm"
              [class.text-neutral-300]="!cell.inMonth"
              [class.dark:text-neutral-600]="!cell.inMonth"
              [class.text-neutral-700]="cell.inMonth && !cell.isToday"
              [class.dark:text-neutral-200]="cell.inMonth && !cell.isToday"
              [class.bg-primary-600]="cell.isToday"
              [class.text-white]="cell.isToday"
              [class.font-semibold]="cell.isToday"
            >
              {{ cell.day }}
            </span>
          }
        </div>

        <button
          type="button"
          (click)="goToday()"
          class="mt-2 w-full rounded-lg bg-neutral-100 py-1.5 text-xs font-medium text-neutral-600 transition-colors hover:bg-neutral-200 dark:bg-neutral-800 dark:text-neutral-300 dark:hover:bg-neutral-700"
        >
          Today
        </button>
      </div>
    }
  </div>

  <!-- User -->
  <div class="flex items-center gap-2">
    <span class="hidden text-right sm:block">
      <span class="block text-sm font-medium leading-tight text-neutral-900 dark:text-white">{{ userName() }}</span>
      <span class="block text-xs leading-tight text-neutral-500">Signed in</span>
    </span>
    <span class="flex h-9 w-9 items-center justify-center rounded-full bg-linear-to-br from-primary-500 to-accent-500 text-sm font-semibold text-white shadow-md" aria-hidden="true">
      {{ initial() }}
    </span>
  </div>
</header>
