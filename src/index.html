<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AccountPro</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Apply the saved theme before first paint to avoid a flash of the wrong
    // theme. Mirrors ThemeService's storage key and resolution logic.
    (function () {
      try {
        var pref = localStorage.getItem('account-pro-theme') || 'system';
        var dark = pref === 'dark' ||
          (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var root = document.documentElement;
        root.classList.toggle('dark', dark);
        root.style.colorScheme = dark ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
